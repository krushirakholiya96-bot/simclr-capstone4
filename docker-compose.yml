version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./data:/app/data
      - ./simclr.db:/app/simclr.db
    env_file:
      - .env
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./results:/app/results
    env_file:
      - .env
    depends_on:
      - api
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0